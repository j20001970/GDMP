name: 🏁 Build Windows
on: [workflow_call, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        arch: ["arm64", "x86_64"]
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Prerequisites
        shell: bash
        run: |
          choco install visualstudio2022buildtools
          choco install visualstudio2022-workload-vctools --params "--add Microsoft.VisualStudio.Component.VC.Tools.ARM64"
          choco install windows-sdk-10.0
          choco install opencv --version 3.4.10

      - name: Setup
        shell: bash
        run: |
          python ./setup.py --custom-opencv-dir C:/tools/opencv/build

      - name: Build
        env:
          BAZEL_VC: "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC"
        shell: bash
        run: |
          source ./venv/Scripts/activate
          python ./build.py desktop --arch ${{ matrix.arch }} --type release --output build/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-windows-${{ matrix.arch }}
          path: |
            build/*.dll
