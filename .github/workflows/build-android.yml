name: 🤖 Build Android
on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: false
  workflow_dispatch:

env:
  work-dir: ${{ github.workspace }}

jobs:
  build:
    strategy:
      matrix:
        arch: ["arm64", "x86_64"]
    name: Android ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    steps:
      - name: Set Working Directory
        if: ${{ inputs.working-directory != '' }}
        run: echo "work-dir=${{ inputs.working-directory }}" >> $GITHUB_ENV

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          cache-save: ${{ github.event_name != 'pull_request' }}
          disk-cache: android-${{ matrix.arch }}
          external-cache: true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup
        working-directory: ${{ env.work-dir }}
        run: |
          python ./setup.py

      - name: Build
        working-directory: ${{ env.work-dir }}
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          python ./build.py android --arch ${{ matrix.arch }} --output build/${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: GDMP-android-${{ matrix.arch }}
          path: |
            ${{ env.work-dir }}/build/*
